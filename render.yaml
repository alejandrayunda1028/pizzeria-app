services:
  - type: web
    name: pizzeria-app
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DB_PATH
        value: /data/database.sqlite
      - key: NODE_ENV
        value: production
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
